</head>

<body>
    <div class="perant">
        <nav class="nav">
            <div class="logo1">
                <img class="img" src="12_-removebg-preview.png">
            </div>
            <div class="links">
                <div class="link">
                    <a href="../home/home.html"><i class="fa-solid fa-house"></i> Home</a>
                </div>

                </div>

                    <i class="fas fa-code-compare"></i> Layout
                </button>
                <button id="theme-switch">
                    <i class="fas fa-moon"></i>
                    <span class="theme-text dark-label"> Dark mode</span>
                    <span class="theme-text light-label"> Light mode</span>
                </button>
            </div>
        </nav>
        <hr color="goldenrod" size="3px" width="100%">

        <div class="all">
            <div class="left-side">
                <h1>Contact Us</h1>
                <br>
                <div class="form">
                    <form>
                        <div class="in-form">
                            <label for="name">User name:</label>
                            <input type="text" id="name" placeholder="Enter your name." name="name">
                        </div>
                        <br>
                        <div class="in-form">
                            <label for="email">Email:</label>
                            <input type="email" id="email" placeholder="Enter your email." name="email">
                        </div>
                        <br>
                        <div class="in-form">
                            <label for="number">Phone number:</label>
                            <input type="text" id="number" placeholder="Enter your phone number." name="number">
                        </div>
                        <br>
                        <div class="in-form">
                            <label for="text">Note:</label>
                            <input type="text" id="text" placeholder="Enter your note." name="note">
                        </div>
                        <br>
                        <button type="button" class="send">Send</button>
                    </form>
                </div>
            </div>

            <div class="right-side">
                <h1>Our Team</h1>
                <table class="team-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Role</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td>1</td><td>Rahma</td><td>Developer</td></tr>
                        <tr><td>2</td><td>Hamza</td><td>Developer</td></tr>

                        <tr><td>6</td><td>Khaled Ahmed</td><td>Developer</td></tr>
                        <tr><td>7</td><td>Mohand Elsaeed</td><td>Developer</td></tr>
                        <tr><td>8</td><td>Hazem Mohamed</td><td>Developer</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <footer>
            <p>©️2026-Global Monuments Exploration project-Helwan university</p>
            <div class="icons">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
            </div>
        </footer>
    </div>
    <script src="contact-us.js"></script>
</body>

</html>
